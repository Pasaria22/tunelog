<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg-dark { fill: #1a1a2e; }
    .eq-bar { fill: #4f8ef7; }
    .eq-bar-dim { fill: #2a4a8a; }
    .name { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 300; fill: #111111; letter-spacing: 5px; }
    .name-accent { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #4f8ef7; letter-spacing: 5px; }
    .badge { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; }
  </style>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="400" height="400" rx="72" class="bg-dark"/>

  <!-- Equalizer bars — 6 bars -->
  <!-- Bar 1 -->
  <rect x="58" y="212" width="28" height="72" rx="5" class="eq-bar-dim"/>
  <rect x="58" y="248" width="28" height="36" rx="5" class="eq-bar"/>
  <!-- Bar 2 -->
  <rect x="100" y="184" width="28" height="100" rx="5" class="eq-bar-dim"/>
  <rect x="100" y="222" width="28" height="62" rx="5" class="eq-bar"/>
  <!-- Bar 3 -->
  <rect x="142" y="148" width="28" height="136" rx="5" class="eq-bar-dim"/>
  <rect x="142" y="188" width="28" height="96" rx="5" class="eq-bar"/>
  <!-- Bar 4 (tallest) -->
  <rect x="184" y="122" width="28" height="162" rx="5" class="eq-bar-dim"/>
  <rect x="184" y="152" width="28" height="132" rx="5" class="eq-bar"/>
  <!-- Bar 5 -->
  <rect x="226" y="156" width="28" height="128" rx="5" class="eq-bar-dim"/>
  <rect x="226" y="182" width="28" height="102" rx="5" class="eq-bar"/>
  <!-- Bar 6 -->
  <rect x="268" y="196" width="28" height="88" rx="5" class="eq-bar-dim"/>
  <rect x="268" y="222" width="28" height="62" rx="5" class="eq-bar"/>
  <!-- Bar 7 -->
  <rect x="310" y="218" width="28" height="66" rx="5" class="eq-bar-dim"/>
  <rect x="310" y="244" width="28" height="40" rx="5" class="eq-bar"/>

  <!-- Dot indicators -->
  <circle cx="72"  cy="244" r="5" fill="#4f8ef7"/>
  <circle cx="114" cy="218" r="5" fill="#4f8ef7"/>
  <circle cx="156" cy="184" r="5" fill="#4f8ef7"/>
  <circle cx="198" cy="148" r="5" fill="#4f8ef7"/>
  <circle cx="240" cy="178" r="5" fill="#4f8ef7"/>
  <circle cx="282" cy="218" r="5" fill="#4f8ef7"/>
  <circle cx="324" cy="240" r="5" fill="#4f8ef7"/>

  <!-- Badge -->
  <rect x="115" y="328" width="170" height="28" rx="14" fill="#4f8ef7"/>
  <text x="200" y="347" text-anchor="middle" class="badge" fill="#ffffff">FRONTEND</text>

  <!-- Name -->
  <text x="200" y="392" text-anchor="middle">
    <tspan class="name">Tune</tspan><tspan class="name-accent">Log</tspan>
  </text>
</svg>
